name: Bug Report
description: Report a bug in LaunchTerminal
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure '...'
        2. Run command '...'
        3. Send message '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform adapter
      multiple: true
      options:
        - Discord
        - Slack
        - Telegram
        - Web/REST
        - WebSocket
        - All platforms
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: LaunchTerminal version
      placeholder: "2.4.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.11.0"

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker
        - Docker Compose
        - Vercel
        - Railway
        - Kubernetes
        - Bare metal / VM
        - Local development

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please paste any relevant log output.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing issues
          required: true
        - label: I am using the latest version of LaunchTerminal
          required: false
